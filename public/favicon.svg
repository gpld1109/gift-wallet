<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0533"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c63ff"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E91E8C"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6c63ff" flood-opacity="0.5"/>
    </filter>
    <clipPath id="roundedBg">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Back card rotated -->
  <g transform="rotate(-12, 256, 256)" filter="url(#shadow)">
    <rect x="96" y="180" width="310" height="190" rx="24" fill="url(#card2)" opacity="0.9"/>
    <rect x="96" y="230" width="310" height="38" fill="#ffffff" opacity="0.15"/>
    <rect x="130" y="200" width="44" height="34" rx="6" fill="#ffd700" opacity="0.8"/>
  </g>

  <!-- Front card -->
  <g filter="url(#shadow2)">
    <rect x="76" y="210" width="330" height="200" rx="26" fill="url(#card1)"/>
    <rect x="76" y="210" width="330" height="200" rx="26" fill="url(#shine)"/>
    <rect x="76" y="268" width="330" height="44" fill="#ffffff" opacity="0.12"/>
    <rect x="116" y="228" width="48" height="36" rx="7" fill="#ffd700" opacity="0.9"/>
    <line x1="140" y1="228" x2="140" y2="264" stroke="#b8860b" stroke-width="2" opacity="0.5"/>
    <line x1="116" y1="246" x2="164" y2="246" stroke="#b8860b" stroke-width="2" opacity="0.5"/>
    <circle cx="188" cy="362" r="5" fill="#fff" opacity="0.6"/>
    <circle cx="204" cy="362" r="5" fill="#fff" opacity="0.6"/>
    <circle cx="220" cy="362" r="5" fill="#fff" opacity="0.6"/>
    <circle cx="236" cy="362" r="5" fill="#fff" opacity="0.6"/>
    <circle cx="264" cy="362" r="5" fill="#fff" opacity="0.6"/>
    <circle cx="280" cy="362" r="5" fill="#fff" opacity="0.6"/>
    <circle cx="296" cy="362" r="5" fill="#fff" opacity="0.6"/>
    <circle cx="312" cy="362" r="5" fill="#fff" opacity="0.6"/>
    <circle cx="356" cy="240" r="16" fill="#ff9900" opacity="0.9"/>
    <circle cx="372" cy="240" r="16" fill="#ff6600" opacity="0.7"/>
  </g>

  <!-- Gift bow -->
  <g transform="translate(256, 200)">
    <ellipse cx="-26" cy="-16" rx="24" ry="14" fill="#ffd700" opacity="0.95" transform="rotate(-20)"/>
    <ellipse cx="26" cy="-16" rx="24" ry="14" fill="#ffd700" opacity="0.95" transform="rotate(20)"/>
    <circle cx="0" cy="0" r="14" fill="#ffd700"/>
    <circle cx="0" cy="0" r="8" fill="#f59e0b"/>
    <path d="M-7,12 Q-18,28 -12,46" stroke="#ffd700" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.85"/>
    <path d="M7,12 Q18,28 12,46" stroke="#ffd700" stroke-width="7" fill="none" stroke-linecap="round" opacity="0.85"/>
  </g>

  <!-- Sparkles -->
  <circle cx="430" cy="95" r="5" fill="#a855f7" opacity="0.9"/>
  <circle cx="418" cy="108" r="3" fill="#a855f7" opacity="0.5"/>
  <circle cx="82" cy="135" r="4" fill="#6c63ff" opacity="0.7"/>
  <circle cx="460" cy="390" r="3" fill="#E91E8C" opacity="0.6"/>
  <circle cx="70" cy="400" r="3" fill="#ffd700" opacity="0.5"/>
</svg>
